{# login.html — Form di accesso. #}
{% extends "base.html" %}

{% block titolo %}Accedi &middot; Biblioteca Diffusa{% endblock %}

{% block contenuto %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <h1 class="h3 mb-4 text-center">Accedi</h1>

        <form method="post" action="{{ url_for('auth.login') }}">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email"
                       value="{{ email or '' }}" required autofocus>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Entra</button>
        </form>

        <p class="text-center mt-3 mb-0">
            Non hai un account?
            <a href="{{ url_for('auth.registrazione') }}">Registrati</a>
        </p>
    </div>
</div>
{% endblock %}
